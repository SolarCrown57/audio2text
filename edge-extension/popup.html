<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #333;
      text-align: center;
    }
    .status {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding: 10px;
      border-radius: 8px;
      background: #f5f5f5;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      background: #ccc;
      flex-shrink: 0;
    }
    .status-dot.connected {
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    .status-dot.capturing {
      background: #ff9800;
      animation: pulse 1s infinite;
    }
    .status-dot.error {
      background: #f44336;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text {
      font-size: 13px;
      color: #666;
      flex: 1;
    }
    .active-count {
      font-size: 11px;
      color: #999;
      background: #e0e0e0;
      padding: 2px 8px;
      border-radius: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 8px;
    }
    #startBtn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    #startBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #stopBtn {
      background: #f44336;
      color: white;
    }
    #stopBtn:hover {
      background: #d32f2f;
    }
    #stopBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #stopAllBtn {
      background: #ff5722;
      color: white;
      display: none;
    }
    #stopAllBtn:hover {
      background: #e64a19;
    }
    .sessions-list {
      margin: 12px 0;
      max-height: 150px;
      overflow-y: auto;
    }
    .session-item {
      display: flex;
      align-items: center;
      padding: 8px;
      margin-bottom: 6px;
      background: #f0f0f0;
      border-radius: 6px;
      font-size: 12px;
    }
    .session-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff9800;
      margin-right: 8px;
      animation: pulse 1s infinite;
    }
    .session-item .title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #333;
    }
    .session-item .stop-btn {
      width: auto;
      padding: 4px 8px;
      margin: 0;
      font-size: 11px;
      background: #f44336;
    }
    .info {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Audio2Text</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Not connected</span>
      <span class="active-count" id="activeCount" style="display:none">0</span>
    </div>
    <button id="startBtn">Capture This Tab</button>
    <button id="stopBtn" style="display:none">Stop This Tab</button>
    <div class="sessions-list" id="sessionsList"></div>
    <button id="stopAllBtn">Stop All Captures</button>
    <div class="info">Capture tab audio for real-time subtitles</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
